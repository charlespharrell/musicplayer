<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width , initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <audio src="" id="audio"></audio>

    <div class="music-player">
       
        
        <div class="disk"></div>

         <h1 class="music-name">Song Name</h1>
        <p class="artist-name">artist</p>
        <div class="song-slider">
            <input type="range" value="0" class="seek-bar" name="" id="">
            <span class="current-time">00:00</span>
            <span class="song-duration">00:00</span>       
        </div>

        <div class="controls">
            <button class="btn backward-btn"><img src="images/pre.png" alt=""></button>
            <button class="play-btn pause">
                <span></span>
                <span></span>
            </button>
            <button class="btn forward-btn"><img src="images/nxt.png" alt=""></button>
        </div>

    </div>
    
    <script src="data.js"></script>
    <script src="index.js"></script>

</body>
</html>
